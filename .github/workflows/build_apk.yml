name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-dev git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade cython buildozer

      - name: Verify model exists
        run: |
          if [ ! -f traffic_lstm.tflite ]; then
            echo "ERROR: traffic_lstm.tflite not found in repository root!"
            exit 1
          fi
          echo "Model found"

      - name: Build APK
        run: |
          echo y | buildozer -v android debug
        timeout-minutes: 120

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: traffic-predictor-lite-apk
          path: bin/*.apk
